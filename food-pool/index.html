<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>肝脏减脂 Food Pool 选餐器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ec;
      --paper: #fffdf7;
      --paper-strong: #ffffff;
      --ink: #20251f;
      --muted: #647067;
      --soft: #edf2e8;
      --line: #d9dfd2;
      --line-strong: #b8c5b4;
      --green: #2f6f4f;
      --green-strong: #204b39;
      --blue: #285d70;
      --yellow: #f4d36c;
      --orange: #bd6a2f;
      --danger: #9c5148;
      --shadow: 0 14px 36px rgba(35, 50, 40, 0.12);
      --radius: 8px;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(180deg, rgba(245, 243, 236, 0.96), rgba(245, 243, 236, 1)),
        radial-gradient(circle at 20% 0%, rgba(244, 211, 108, 0.22), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(47, 111, 79, 0.18), transparent 34%);
      color: var(--ink);
    }

    button {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      padding: 14px;
    }

    .shell {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .hero,
    .workspace,
    .result-panel,
    .recipe-catalog {
      background: rgba(255, 253, 247, 0.96);
      border: 1px solid rgba(217, 223, 210, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 20px;
      display: grid;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(255, 253, 247, 0.98), rgba(248, 238, 216, 0.94)),
        radial-gradient(circle at 90% 12%, rgba(47, 111, 79, 0.12), transparent 34%);
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--green-strong);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--green);
      color: #fff;
      font-size: 16px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
      letter-spacing: 0;
    }

    h1 {
      margin-top: 10px;
      font-family: "Songti SC", "STSong", "SimSun", "PingFang SC", serif;
      font-size: 56px;
      font-weight: 900;
      line-height: 0.96;
    }

    .hero-title-line {
      display: block;
    }

    .hero-title-accent {
      color: var(--green);
    }

    .lead {
      color: #3b443d;
      font-size: 16px;
      line-height: 1.65;
    }

    .hero-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .season-control {
      display: grid;
      gap: 9px;
    }

    .season-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .season-current {
      border: 1px solid rgba(47, 111, 79, 0.18);
      border-radius: var(--radius);
      background: rgba(47, 111, 79, 0.08);
      color: var(--green-strong);
      padding: 4px 8px;
      white-space: nowrap;
    }

    .season-options {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .season-option {
      min-height: 36px;
      border: 1px solid rgba(217, 223, 210, 0.9);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, 0.78);
      color: #445047;
      padding: 7px 8px;
      font-weight: 700;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .season-option[aria-pressed="true"] {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .text-button,
    .primary-button {
      min-height: 44px;
      border-radius: var(--radius);
      padding: 9px 12px;
      font-weight: 800;
    }

    .primary-button {
      border: 1px solid var(--green);
      background: var(--green);
      color: #fff;
    }

    .text-button {
      border: 1px solid var(--line-strong);
      background: var(--paper-strong);
      color: var(--ink);
    }

    .meal-progress {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      align-items: start;
      padding: 6px 2px;
    }

    .progress-step {
      position: relative;
      min-height: 54px;
      border: 0;
      background: transparent;
      color: var(--muted);
      display: grid;
      justify-items: center;
      gap: 6px;
      padding: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .progress-step:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 17px;
      left: calc(50% + 24px);
      right: calc(-50% + 24px);
      height: 1px;
      background: var(--line-strong);
    }

    .progress-number {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 1px solid var(--line-strong);
      background: var(--paper-strong);
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    .progress-step.is-active,
    .progress-step.is-complete {
      color: var(--green-strong);
    }

    .progress-step.is-active .progress-number {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 111, 79, 0.12);
    }

    .progress-step.is-complete .progress-number {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .workspace {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .choice-step {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      overflow: clip;
    }

    .step-toggle {
      width: 100%;
      min-height: 64px;
      border: 0;
      background: transparent;
      color: var(--ink);
      padding: 12px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      align-items: center;
      text-align: left;
    }

    .step-number {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--soft);
      color: var(--green-strong);
      font-weight: 800;
    }

    .step-title {
      display: grid;
      gap: 4px;
    }

    .step-title strong {
      font-size: 17px;
      line-height: 1.25;
    }

    .step-summary {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .step-state {
      color: var(--green-strong);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .step-content {
      display: none;
      border-top: 1px solid var(--line);
      padding: 10px;
      background: #fbfcf8;
    }

    .choice-step.is-open .step-content {
      display: grid;
      gap: 10px;
    }

    .choice-step.is-complete .step-number {
      background: var(--green);
      color: #fff;
    }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .food-card {
      min-height: 154px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      padding: 0;
      overflow: clip;
      text-align: left;
      display: grid;
      grid-template-rows: 118px 1fr;
      transition: border-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .food-card:hover {
      border-color: var(--green);
    }

    .food-card[aria-pressed="true"] {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 111, 79, 0.18);
      transform: translateY(-1px);
    }

    .food-card img {
      width: 100%;
      height: 118px;
      object-fit: cover;
      padding: 0;
      background: linear-gradient(180deg, #f8fbf4, #edf2e8);
    }

    .food-card-body {
      padding: 9px;
      display: grid;
      gap: 6px;
      align-content: start;
      min-width: 0;
    }

    .food-title {
      display: grid;
      gap: 5px;
    }

    .food-title strong {
      font-size: 15px;
      line-height: 1.25;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 21px;
      border-radius: 999px;
      padding: 2px 7px;
      background: var(--soft);
      color: var(--green-strong);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      white-space: nowrap;
    }

    .chip.priority-medium {
      background: #f2dfc8;
      color: #684019;
    }

    .chip.priority-low {
      background: #efd8d3;
      color: #6b342e;
    }

    .chip.seasonal {
      background: #fff1b7;
      color: #60490e;
    }

    .food-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .step-footer {
      display: flex;
      justify-content: flex-end;
    }

    .result-panel,
    .recipe-catalog {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .result-head {
      display: grid;
      gap: 6px;
    }

    .result-head h2 {
      font-size: 22px;
      line-height: 1.25;
    }

    .result-head p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .plate {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .plate-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f7faf3;
      padding: 10px;
      display: grid;
      gap: 4px;
    }

    .plate-box strong {
      color: var(--green-strong);
      font-size: 13px;
    }

    .plate-box span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .analysis-list {
      display: grid;
      gap: 7px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .analysis-list li {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      color: #39433b;
      padding: 9px 10px;
      font-size: 14px;
      line-height: 1.55;
    }

    .recipe-list {
      display: grid;
      gap: 10px;
    }

    .recipe-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      overflow: clip;
      display: grid;
      grid-template-columns: 112px 1fr;
      min-height: 174px;
    }

    .recipe-combo-image {
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      background: linear-gradient(180deg, #f8fbf4, #edf2e8);
    }

    .recipe-combo-image img {
      width: 112px;
      height: 100%;
      min-height: 0;
      object-fit: cover;
      padding: 0;
      border-bottom: 1px solid rgba(217, 223, 210, 0.72);
    }

    .recipe-combo-image img:last-child {
      border-bottom: 0;
    }

    .recipe-body {
      padding: 11px;
      display: grid;
      gap: 9px;
    }

    .recipe-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .recipe-title-row h3 {
      font-size: 16px;
      line-height: 1.35;
      min-width: 0;
    }

    .score {
      min-width: 46px;
      border-radius: 999px;
      padding: 3px 7px;
      background: #e7f0f3;
      color: var(--blue);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .recipe-card p,
    .recipe-card ol {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .recipe-card ol {
      padding-left: 18px;
    }

    .recipe-block {
      display: grid;
      gap: 3px;
    }

    .recipe-label {
      color: var(--green-strong);
      font-size: 12px;
      font-weight: 800;
    }

    .recipe-ingredients {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .recipe-execution {
      border: 1px solid rgba(124, 151, 111, 0.26);
      border-radius: var(--radius);
      background: #fbfcf7;
      padding: 9px;
      display: grid;
      gap: 8px;
    }

    .execution-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .execution-item {
      border-radius: 8px;
      background: #f1f5ec;
      padding: 7px 8px;
      min-width: 0;
    }

    .execution-item span {
      display: block;
      color: rgba(58, 70, 56, 0.7);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .execution-item strong {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    .template-list {
      display: grid;
      gap: 10px;
    }

    .template-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper-strong);
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    button.template-card {
      width: 100%;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      appearance: none;
    }

    button.template-card[aria-pressed="true"] {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(47, 111, 79, 0.14);
    }

    .template-card h3 {
      font-size: 16px;
      line-height: 1.35;
    }

    .template-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .template-match {
      border-radius: 8px;
      background: rgba(47, 111, 79, 0.1);
      color: var(--green);
      padding: 7px 8px;
    }

    .template-card p,
    .template-card ol {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .template-card ol {
      padding-left: 18px;
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 12px;
      background: #f7faf3;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .source-note {
      color: rgba(32, 37, 31, 0.66);
      font-size: 12px;
      line-height: 1.55;
      padding: 0 2px 8px;
    }

    .source-note a {
      color: var(--green-strong);
      font-weight: 800;
      text-decoration: none;
    }

    .source-note a:hover {
      text-decoration: underline;
    }

    @media (min-width: 720px) {
      .app {
        padding: 24px;
      }

      .hero {
        grid-template-columns: minmax(0, 1fr) 300px;
        align-items: end;
        padding: 24px;
      }

      h1 {
        font-size: 68px;
      }

      .hero-actions {
        align-self: stretch;
        align-content: end;
      }

      .workspace,
      .result-panel,
      .recipe-catalog {
        padding: 18px;
      }

      .food-grid {
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      }

      .food-card {
        grid-template-rows: 132px 1fr;
      }

      .food-card img {
        height: 132px;
      }

      .plate {
        grid-template-columns: 1fr 1fr;
      }

      .plate-box:first-child {
        grid-column: 1 / -1;
      }

      .recipe-card {
        grid-template-columns: 144px 1fr;
      }

      .recipe-combo-image img {
        width: 144px;
      }
    }

    @media (min-width: 1040px) {
      .shell {
        grid-template-columns: minmax(0, 1fr) 390px;
        align-items: start;
      }

      .hero {
        grid-column: 1 / -1;
      }

      .meal-progress {
        grid-column: 1 / -1;
        width: min(760px, 100%);
        justify-self: center;
      }

      .recipe-catalog {
        grid-column: 1 / 2;
      }

      .source-note {
        grid-column: 1 / -1;
      }

      .result-panel {
        position: sticky;
        top: 18px;
      }
    }

    @media (max-width: 720px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .hero,
      .workspace,
      .result-panel,
      .recipe-catalog {
        box-shadow: 0 8px 20px rgba(35, 50, 40, 0.09);
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      .season-options {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .step-toggle {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .step-state {
        grid-column: 2;
      }

      .recipe-card {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .recipe-combo-image {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: 1fr;
        min-height: 106px;
      }

      .recipe-combo-image img {
        width: 100%;
        height: 106px;
        border-right: 1px solid rgba(217, 223, 210, 0.72);
        border-bottom: 0;
      }

      .recipe-combo-image img:last-child {
        border-right: 0;
      }

      .recipe-body {
        padding: 10px;
      }

      .recipe-title-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 8px;
      }

      .hero {
        padding: 18px;
      }

      .brand-mark {
        width: 30px;
        height: 30px;
      }

      h1 {
        font-size: 48px;
      }

      .lead {
        font-size: 15px;
      }

      .food-grid {
        grid-template-columns: 1fr;
      }

      .food-card {
        min-height: 116px;
        grid-template-columns: 104px minmax(0, 1fr);
        grid-template-rows: auto;
      }

      .food-card img {
        width: 104px;
        height: 100%;
        min-height: 116px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="shell">
      <section class="hero" aria-labelledby="page-title">
        <div>
          <div class="brand-lockup">
            <span class="brand-mark" aria-hidden="true">食</span>
            <span>Food Pool · 配餐助手</span>
          </div>
          <h1 id="page-title">
            <span class="hero-title-line">今天这餐</span>
            <span class="hero-title-line hero-title-accent">怎么配</span>
          </h1>
          <p class="lead">主食 1 个 + 蛋白 1 个 + 蔬菜 / 高纤维 1-2 个，最后选做法模板。本人主食减量，其他家人可加主食；同一锅菜，不必拆成两套饭。</p>
        </div>

        <div class="hero-actions">
          <div class="season-control" aria-label="时令偏好">
            <div class="season-head">
              <span>时令偏好</span>
              <span class="season-current" data-role="season-current">当前春季</span>
            </div>
            <div class="season-options">
              <button type="button" class="season-option" data-action="season" data-season="auto" aria-pressed="true">自动</button>
              <button type="button" class="season-option" data-action="season" data-season="all" aria-pressed="false">全部</button>
              <button type="button" class="season-option" data-action="season" data-season="spring" aria-pressed="false">春季</button>
              <button type="button" class="season-option" data-action="season" data-season="summer" aria-pressed="false">夏季</button>
              <button type="button" class="season-option" data-action="season" data-season="autumn" aria-pressed="false">秋季</button>
              <button type="button" class="season-option" data-action="season" data-season="winter" aria-pressed="false">冬季</button>
            </div>
          </div>
          <div class="button-row">
            <button type="button" class="primary-button" data-action="random">随机稳妥餐</button>
            <button type="button" class="text-button" data-action="clear">清空重选</button>
          </div>
        </div>
      </section>

      <nav class="meal-progress" aria-label="配餐进度">
        <button type="button" class="progress-step is-active" data-action="toggle-step" data-target="carb" data-role="progress-carb" aria-current="step">
          <span class="progress-number">1</span>
          <span>主食</span>
        </button>
        <button type="button" class="progress-step" data-action="toggle-step" data-target="protein" data-role="progress-protein">
          <span class="progress-number">2</span>
          <span>蛋白</span>
        </button>

    const TEMPLATE_MATCH_RULES = {
      blanch: {

    const TEMPLATE_VERBS = {
      blanch: "白灼",
      soup: "汤煮",
      "stir-fry": "少油快炒",

    const templateById = Object.fromEntries(COOKING_TEMPLATES.map((template) => [template.id, template]));

    const state = {
      carb: null,
      protein: null,
      fibers: [],
      templateId: null,
      openStep: "carb",
      seasonFilter: "auto"
    };

    const allFoods = [...FOODS.carbs, ...FOODS.proteins, ...FOODS.fibers];
    const byId = Object.fromEntries(allFoods.map((food) => [food.id, food]));

    function getCurrentSeason() {
      const month = new Date().getMonth() + 1;
      if (month >= 3 && month <= 5) return "spring";
      if (month >= 6 && month <= 8) return "summer";
      if (month >= 9 && month <= 11) return "autumn";
      return "winter";
    }

    function activeSeason() {
      return state.seasonFilter === "auto" ? getCurrentSeason() : state.seasonFilter;
    }

    function setSeasonFilter(season) {
      state.seasonFilter = season;
      render();
    }

    function updateSeasonControls() {
      document.querySelectorAll('[data-action="season"]').forEach((button) => {
        const active = button.dataset.season === state.seasonFilter;
        button.classList.toggle("is-active", active);
        button.setAttribute("aria-pressed", String(active));
      });

      const label = state.seasonFilter === "auto"
        ? `当前 ${SEASON_LABELS[getCurrentSeason()]}`
        : state.seasonFilter === "all"
          ? "全部时令"
          : SEASON_LABELS[state.seasonFilter];
      document.querySelector('[data-role="season-current"]').textContent = label;
    }

    function isSeasonal(item) {
      const season = activeSeason();
      return season === "all" || item.seasonal.includes(season);
    }

    function foodImage(food) {
      return FOOD_IMAGE_URLS[food.id] || fallbackImage;
    }

    function priorityClass(priority) {
      if (priority === "中" || priority === "低热量配菜") return "priority-medium";
      if (priority === "低频") return "priority-low";
      return "";
    }

    function seasonText(item) {
      return item.seasonal.map((season) => SEASON_LABELS[season]).join(" / ");
    }

    function chipHtml(food) {
      const seasonal = isSeasonal(food) ? `<span class="chip seasonal">时令</span>` : "";
      return `
        <span class="chip ${priorityClass(food.priority)}">${food.priority}</span>
        ${seasonal}
      `;
    }

    function renderFoodCard(food, group) {
      const pressed = group === "fiber" ? state.fibers.includes(food.id) : state[group] === food.id;
      const button = document.createElement("button");
      button.type = "button";
      button.className = "food-card";
      button.dataset.foodId = food.id;
      button.dataset.group = group;
      button.setAttribute("aria-pressed", String(pressed));
      button.innerHTML = `
        <img src="${foodImage(food)}" alt="${food.alt}" loading="lazy" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src=fallbackImage;">
        <span class="food-card-body">
          <span class="food-title">
            <strong>${food.name}</strong>
            <span class="chip-row">${chipHtml(food)}</span>
          </span>
          <span class="food-note">${food.note} ${seasonText(food)}</span>
        </span>
      `;
      button.addEventListener("click", () => selectFood(food.id, group));
      return button;
    }

    function seasonSort(a, b) {
      return Number(isSeasonal(b)) - Number(isSeasonal(a));
    }

    function renderFoodGrids() {
      document.querySelector('[data-role="carb-grid"]').replaceChildren(
        ...[...FOODS.carbs].sort(seasonSort).map((food) => renderFoodCard(food, "carb"))
      );
      document.querySelector('[data-role="protein-grid"]').replaceChildren(
        ...[...FOODS.proteins].sort(seasonSort).map((food) => renderFoodCard(food, "protein"))
      );
      document.querySelector('[data-role="fiber-grid"]').replaceChildren(
        ...[...FOODS.fibers].sort(seasonSort).map((food) => renderFoodCard(food, "fiber"))
      );
    }

    function collapseStep(step) {
      const element = document.querySelector(`[data-step="${step}"]`);
      if (element) element.classList.remove("is-open");
    }

    function openNextStep(step) {
      const order = ["carb", "protein", "fiber", "template"];
      const index = order.indexOf(step);
      const next = order[index + 1];
      state.openStep = next || step;
    }

    function toggleStep(step) {
      state.openStep = state.openStep === step ? "" : step;
      render();
    }

    function selectFood(id, group) {
      if (group === "fiber") {
        if (state.fibers.includes(id)) {
          state.fibers = state.fibers.filter((item) => item !== id);
        } else {
          state.fibers = [...state.fibers, id].slice(-2);
          if (state.fibers.length === 2) {
            collapseStep("fiber");
            state.openStep = "template";
          }
        }
      } else {
        state[group] = state[group] === id ? null : id;
        if (state[group]) {
          collapseStep(group);
          openNextStep(group);
        }
      }
      render();
    }

    function selectTemplate(id) {
      state.templateId = state.templateId === id ? null : id;
      if (state.templateId) {
        collapseStep("template");
        state.openStep = "";
      } else {
        state.openStep = "template";
      }
      render();
    }

    function completeFiberStep() {
      collapseStep("fiber");
      state.openStep = state.fibers.length ? "template" : "fiber";
      render();
    }

    function selectedNames(ids) {
      return ids.map((id) => byId[id]?.name).filter(Boolean).join(" + ");
    }

    function updateStepStates() {
      const completed = {
        carb: Boolean(state.carb),
        protein: Boolean(state.protein),
        fiber: state.fibers.length > 0,
        template: Boolean(state.templateId)
      };
      for (const step of ["carb", "protein", "fiber", "template"]) {
        const element = document.querySelector(`[data-step="${step}"]`);
        element.classList.toggle("is-open", state.openStep === step);
        element.classList.toggle("is-complete", completed[step]);
      }

      document.querySelector('[data-role="state-carb"]').textContent = state.carb ? "已选" : "未选";
      document.querySelector('[data-role="state-protein"]').textContent = state.protein ? "已选" : "未选";
      document.querySelector('[data-role="state-fiber"]').textContent = state.fibers.length ? `已选 ${state.fibers.length}` : "未选";
      document.querySelector('[data-role="state-template"]').textContent = state.templateId ? "已选" : "未选";
      document.querySelector('[data-role="summary-carb"]').textContent = state.carb ? byId[state.carb].name : "本人默认 0.5 个拳头";
      document.querySelector('[data-role="summary-protein"]').textContent = state.protein ? byId[state.protein].name : "鱼虾鸡豆制品优先";
      document.querySelector('[data-role="summary-fiber"]').textContent = state.fibers.length ? selectedNames(state.fibers) : "选 1-2 个，最好有绿叶菜或菌菇";
      document.querySelector('[data-role="summary-template"]').textContent = state.templateId ? templateById[state.templateId].title : "按当前食材只显示匹配模板";
    }

    function updateProgress() {
      const completed = {
        carb: Boolean(state.carb),
        protein: Boolean(state.protein),
        fiber: state.fibers.length > 0,
        template: Boolean(state.templateId)
      };

      for (const step of ["carb", "protein", "fiber", "template"]) {
        const button = document.querySelector(`[data-role="progress-${step}"]`);
        const active = state.openStep === step;
        button.classList.toggle("is-active", active);
        button.classList.toggle("is-complete", completed[step]);
        if (active) {
          button.setAttribute("aria-current", "step");
        } else {
          button.removeAttribute("aria-current");
        }
      }
    }

    function buildAnalysis() {
      const messages = [];
      const carb = byId[state.carb];
      const protein = byId[state.protein];
      const fibers = state.fibers.map((id) => byId[id]).filter(Boolean);
      const template = templateById[state.templateId];
      const season = activeSeason();
      const seasonLabel = season === "all" ? "不限时令" : SEASON_LABELS[season];

      if (!carb && !protein && fibers.length === 0) {
        return [`当前按${seasonLabel}排序。先选主食、蛋白、1-2 个蔬菜，再选做法模板，下面才会生成最终菜谱。`];
      }

      if (carb) {
        const carbMessage = ["corn", "potato", "pumpkin"].includes(carb.id)
          ? `${carb.name}已经算主食，这餐不要再默认叠加米饭。`
          : `${carb.name}可按本人 0.5 个拳头起步，训练日或活动多再提高。`;
        messages.push(carbMessage);
      } else {
        messages.push("还缺一份低加工主食；本人不需要多，但完全不放容易晚些时候饿。");
      }

      if (protein) {
        if (protein.id === "lean-beef") {
          messages.push("瘦牛肉建议作为每周 1 次左右的变化项，这餐调味保持少油少糖。");
        } else {
          messages.push(`${protein.name}适合作为这餐蛋白主轴，优先清蒸、白灼、少油煎烤或汤菜。`);
        }
      } else {
        messages.push("还缺一份优质蛋白；优先鱼、虾、去皮鸡肉、豆腐或鸡蛋。");
      }

      if (fibers.length === 0) {
        messages.push("还缺蔬菜 / 高纤维配菜；本人这餐至少补到 2 个拳头。");
      } else if (fibers.length === 1) {
        messages.push(`${fibers[0].name}可以作为半盘基础；若方便，再加一份菌菇、绿叶菜或海藻类。`);
      } else {
        messages.push(`${selectedNames(state.fibers)}覆盖了蔬菜体积，适合把本人餐盘的半盘做足。`);
      }

      if (template) {
        messages.push(`做法模板：${template.title}。最终菜谱会只使用当前选中的食材生成。`);
      } else {
        messages.push("还缺最后一步做法模板；选完模板后再生成最终菜谱。");
      }

      messages.push(`时令偏好：${seasonLabel}。时令食材会加分，但家里已有的非时令食材也可以用。`);
      return messages;
    }

    function renderAnalysis() {
      const list = document.querySelector('[data-role="analysis"]');
      list.replaceChildren(...buildAnalysis().map((message) => {
        const item = document.createElement("li");
        item.textContent = message;
        return item;
      }));

      document.querySelector('[data-role="plate-carb"]').textContent = state.carb ? byId[state.carb].name : "选择主食";
      document.querySelector('[data-role="plate-protein"]').textContent = state.protein ? byId[state.protein].name : "选择蛋白";
      document.querySelector('[data-role="plate-fiber"]').textContent = state.fibers.length ? selectedNames(state.fibers) : "先选蔬菜 / 菌菇 / 海带类";

      const season = activeSeason();
      const label = season === "all" ? "不限时令" : SEASON_LABELS[season];
      document.querySelector('[data-role="season-note"]').textContent = `当前：${label}。选完四步后，最终菜谱只绑定你已选的食材。`;
    }

    function selectedFoodObjects() {
      const carb = FOODS.carbs.find((food) => food.id === state.carb);
      const protein = FOODS.proteins.find((food) => food.id === state.protein);
      const fibers = state.fibers.map((id) => byId[id]).filter(Boolean);
      const template = templateById[state.templateId];
      return { carb, protein, fibers, template };
    }

    function dishVerbForTemplate(templateId) {
      return TEMPLATE_VERBS[templateId] || "清淡处理";
    }

    function templateMatch(template) {
      const { carb, protein, fibers } = selectedFoodObjects();
      if (!carb || !protein || fibers.length === 0) {
        return { score: 0, matchReason: "先选完主食、蛋白和蔬菜后显示匹配模板" };
      }

      const rules = TEMPLATE_MATCH_RULES[template.id] || { proteins: [], carbs: [], fibers: [] };
      const matchedFibers = fibers.filter((food) => rules.fibers.includes(food.id));
      const reasons = [];
      let score = 0;

      if (rules.proteins.includes(protein.id)) {
        score += 3;
        reasons.push(`${protein.name}适合${dishVerbForTemplate(template.id)}`);
      }
      if (rules.carbs.includes(carb.id)) {
        score += 1;
        reasons.push(`${carb.name}适合这个模板`);
      }
      if (matchedFibers.length) {
        score += matchedFibers.length * 2;
        reasons.push(`${matchedFibers.map((food) => food.name).join("、")}适合${dishVerbForTemplate(template.id)}`);
      }

      return {
        score,
        matchReason: reasons.slice(0, 2).join("；") || "低油通用做法，可作为兜底"
      };
    }

    function recommendedTemplates() {
      const { carb, protein, fibers } = selectedFoodObjects();
      if (!carb || !protein || fibers.length === 0) return [];

      const ranked = COOKING_TEMPLATES
        .map((template, index) => ({ ...template, order: index, ...templateMatch(template) }))
        .filter((template) => template.score > 0)
        .sort((a, b) => b.score - a.score || a.order - b.order)
        .slice(0, MAX_TEMPLATE_OPTIONS);

      return ranked.length
        ? ranked
        : COOKING_TEMPLATES.slice(0, 1).map((template) => ({ ...template, ...templateMatch(template) }));
    }

    function reconcileTemplateSelection() {
      if (!state.templateId) return;
      const visibleTemplateIds = recommendedTemplates().map((template) => template.id);
      if (!visibleTemplateIds.includes(state.templateId)) {
        state.templateId = null;
      }
    }

    function canBuildFinalRecipe() {
      const { carb, protein, fibers, template } = selectedFoodObjects();
      return Boolean(carb && protein && fibers.length > 0 && template);
    }

    function bestFiberTemplateId(fibers, fallbackTemplate) {
      const ranked = Object.entries(TEMPLATE_MATCH_RULES)
        .map(([templateId, rules], index) => ({
          templateId,
          index,
          score: fibers.filter((food) => rules.fibers.includes(food.id)).length
        }))
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || a.index - b.index);
      return ranked[0]?.templateId || fallbackTemplate.id;
    }

    function proteinDishTitle(template, protein) {
      return `${dishVerbForTemplate(template.id)}${protein.name}`;
    }

    function fiberDishTitle(template, fibers) {
      const fiberNames = fibers.map((food) => food.name).join("、");
      return `${dishVerbForTemplate(bestFiberTemplateId(fibers, template))}${fiberNames}`;
    }

    function proteinStepForTemplate(template, protein) {
      const steps = {
        blanch: `${protein.name}按白灼处理：水开后下锅，刚变色或刚断生就捞出沥水。`,
        soup: `${protein.name}按汤煮处理：汤底先出味，再下蛋白煮到刚熟。`,
        "stir-fry": `${protein.name}按少油快炒处理：切薄后快炒到刚熟，先盛出避免变老。`,
        steam: `${protein.name}按清蒸处理：水开后上锅，蒸到中心完全熟透。`,
        "cold-mix": `${protein.name}需要熟吃则先焯熟或煎定型，再切块拌入。`,
        "steam-pan": `${protein.name}少油煎或加水焖到熟透，锅干就补水汽不补油。`
      };
      return steps[template.id] || `${protein.name}按${template.title}处理到刚熟。`;
    }

    function fiberStepForTemplate(templateId, fibers) {
      const fiberNames = fibers.map((food) => food.name).join("、");
      const steps = {
        blanch: `${fiberNames}按白灼处理：耐煮的先下，变亮断生后捞出调味。`,
        soup: `${fiberNames}按汤煮处理：耐煮的先下，绿叶菜最后 30-60 秒下。`,
        "stir-fry": `${fiberNames}按少油快炒处理：用锅内余油和一勺水汽炒熟。`,
        steam: `${fiberNames}按清蒸处理：切到厚薄接近，蒸熟后再清淡调味。`,
        "cold-mix": `${fiberNames}按凉拌处理：能生吃的切丝或切片，需要熟吃的先焯熟，拌醋、低钠酱油和胡椒。`,
        "steam-pan": `${fiberNames}按蒸后拌处理：先蒸软或焖软，再用清淡料汁拌匀。`
      };
      return steps[templateId] || `${fiberNames}单独做成清淡配菜。`;
    }

    function buildFinalSteps(template, carb, protein, fibers) {
      const fiberTemplateId = bestFiberTemplateId(fibers, template);
      return [
        `${carb.name}先按本人半份备好，家人主食另加。`,
        proteinStepForTemplate(template, protein),
        fiberStepForTemplate(fiberTemplateId, fibers),
        `最后按“${proteinDishTitle(template, protein)} + ${fiberDishTitle(template, fibers)} + ${carb.name}”分盘。`
      ];
    }

    function buildFinalRecipe() {
      const { carb, protein, fibers, template } = selectedFoodObjects();
      const fiberNames = fibers.map((food) => food.name).join("、");
      const proteinDish = proteinDishTitle(template, protein);
      const fiberDish = fiberDishTitle(template, fibers);
      const dishGroups = [proteinDish, fiberDish, carb.name];
      return {
        id: "selected-final-recipe",
        title: dishGroups.join(" + "),
        menuTitle: dishGroups.join(" + "),
        dishGroups,
        imageFoods: [protein.id, ...fibers.map((food) => food.id), carb.id],
        imageAlt: `${protein.name}、${fiberNames}和${carb.name}食材组合图`,
        seasonal: [...new Set([carb, protein, ...fibers].flatMap((food) => food.seasonal))],
        tags: ["当前选择", template.title, "照着做"],
        scoreLabel: "已生成",
        templateId: template.id,
        tools: template.tools.split(" / "),
        time: template.time,
        difficulty: "简单",
        ingredients: [carb.name, protein.name, ...fibers.map((food) => food.name), "姜蒜可选", "醋 / 低钠酱油 / 胡椒"],
        portionNote: `本人：${carb.name}按 0.5 个拳头起步，${protein.name}约 1 个掌心，${fiberNames}补到半盘以上。`,
        familyPortionNote: `家人：${carb.name}加到正常主食量，${protein.name}和蔬菜按人数放大。`,
        keyJudgement: `${template.keyPoint}；${fiberDish}单独按对应做法处理，不和${protein.name}糊成一锅。`,
        fallback: template.fallback,
        why: `这张菜谱由当前选择生成：主食是${carb.name}，蛋白菜式是${proteinDish}，蔬菜菜式是${fiberDish}，做法模板是${template.title}。`,
        lowOilAdaptation: `${proteinDish}套用${template.title}；${fiberDish}按蔬菜自己的低油做法处理，锅干优先加水汽、醋或胡椒，不补重油重酱。`,
        steps: buildFinalSteps(template, carb, protein, fibers)
      };
    }

    function menuTitle(recipe) {
      if (recipe.menuTitle) return recipe.menuTitle;
      if (recipe.dishGroups?.length) return recipe.dishGroups.join(" + ");
      return recipe.title;
    }

    function recipeImageFoods(recipe) {
      const ids = recipe.imageFoods?.length
        ? recipe.imageFoods
        : [recipe.proteins[0], recipe.fibers[0], recipe.carbs[0]].filter(Boolean);
      return ids.slice(0, 3).map((id) => byId[id]).filter(Boolean);
    }

    function recipeComboImageHtml(recipe) {
      return `
        <div class="recipe-combo-image" role="img" aria-label="${recipe.imageAlt}">
          ${recipeImageFoods(recipe).map((food) => `
            <img src="${foodImage(food)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src=fallbackImage;">
          `).join("")}
        </div>
      `;
    }

    function recipeExecutionHtml(recipe) {
      const template = templateById[recipe.templateId];
      const meta = [
        ["工具", recipe.tools.join(" / ")],
        ["耗时", recipe.time],
        ["难度", recipe.difficulty],
        ["模板", template?.title || "家常模板"]
      ];

      return `
        <div class="recipe-execution" aria-label="执行卡">
          <span class="recipe-label">执行卡</span>
          <div class="execution-grid">
            ${meta.map(([label, value]) => `
              <div class="execution-item">
                <span>${label}</span>
                <strong>${value}</strong>
              </div>
            `).join("")}
          </div>
          <div class="recipe-block">
            <span class="recipe-label">家人加量</span>
            <p>${recipe.familyPortionNote}</p>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">关键判断</span>
            <p>${recipe.keyJudgement}</p>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">失败兜底</span>
            <p>${recipe.fallback}</p>
          </div>
        </div>
      `;
    }

    function renderRecipeCard(recipe) {
      const seasonChip = isSeasonal(recipe) ? `<span class="chip seasonal">时令</span>` : "";
      const card = document.createElement("article");
      card.className = "recipe-card";
      card.innerHTML = `
        ${recipeComboImageHtml(recipe)}
        <div class="recipe-body">
          <div class="recipe-title-row">
            <h3>${menuTitle(recipe)}</h3>
            <span class="score">${recipe.scoreLabel || `${recipe.score} 分`}</span>
          </div>
          <div class="chip-row">${seasonChip}${recipe.tags.map((tag) => `<span class="chip">${tag}</span>`).join("")}</div>
          ${recipeExecutionHtml(recipe)}
          <div class="recipe-block">
            <span class="recipe-label">所需食材</span>
            <span class="recipe-ingredients">${recipe.ingredients.join("、")}</span>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">适配原因</span>
            <p>${recipe.why}</p>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">本人份量</span>
            <p>${recipe.portionNote}</p>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">少油改法</span>
            <p>${recipe.lowOilAdaptation}</p>
          </div>
          <div class="recipe-block">
            <span class="recipe-label">2-4 步做法</span>
            <ol>${recipe.steps.slice(0, 4).map((step) => `<li>${step}</li>`).join("")}</ol>
          </div>
        </div>
      `;
      return card;
    }

    function renderCookingTemplateCard(template) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "template-card";
      card.dataset.templateId = template.id;
      card.setAttribute("aria-pressed", String(state.templateId === template.id));
      card.innerHTML = `
        <h3>${template.title}</h3>
        <div class="template-meta">
          <span class="chip seasonal">匹配模板</span>
          <span class="chip">${template.time}</span>
          <span class="chip">${template.tools}</span>
        </div>
        ${template.matchReason ? `<p class="template-match"><strong>为什么：</strong>${template.matchReason}</p>` : ""}
        <p><strong>适合：</strong>${template.bestFor}</p>
        <p><strong>关键判断：</strong>${template.keyPoint}</p>
        <ol>${template.steps.map((step) => `<li>${step}</li>`).join("")}</ol>
        <p><strong>失败兜底：</strong>${template.fallback}</p>
      `;
      card.addEventListener("click", () => selectTemplate(template.id));
      return card;
    }

    function renderCookingTemplates() {
      const container = document.querySelector('[data-role="template-grid"]');
      const templates = recommendedTemplates();

      if (!templates.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "先选完主食、蛋白和蔬菜，这里只显示匹配当前食材的做法模板。";
        container.replaceChildren(empty);
        return;
      }

      container.replaceChildren(...templates.map(renderCookingTemplateCard));
    }

    function renderRecipes() {
      const container = document.querySelector('[data-role="recipes"]');

      if (!canBuildFinalRecipe()) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "先选完主食、蛋白、蔬菜和做法模板，再生成最终菜谱。";
        container.replaceChildren(empty);
        return;
      }

      container.replaceChildren(renderRecipeCard(buildFinalRecipe()));
    }

    function randomSteadyMeal() {
      const steady = [
        ["sweet-potato", "chicken-leg", ["oyster-mushroom", "water-spinach"], "steam-pan"],
        ["millet-rice", "lean-pork", ["celery", "wood-ear"], "stir-fry"],
        ["tricolor-quinoa", "shrimp", ["broccoli", "lettuce"], "blanch"],
        ["brown-rice", "fish", ["tomato", "shimeji"], "soup"],
        ["soba", "tofu-skin", ["chrysanthemum", "wood-ear"], "soup"],
        ["corn", "shellfish", ["winter-melon", "bok-choy"], "soup"]
      ].filter((meal) => meal.some((id) => isSeasonal(byId[id] || { seasonal: [] })));
      const pool = steady.length ? steady : [["sweet-potato", "chicken", ["shiitake", "bok-choy"], "steam-pan"]];
      const pick = pool[Math.floor(Math.random() * pool.length)];
      state.carb = pick[0];
      state.protein = pick[1];
      state.fibers = pick[2];
      state.templateId = pick[3];
      state.openStep = "";
      render();
    }

    function clearSelection() {
      state.carb = null;
      state.protein = null;
      state.fibers = [];
      state.templateId = null;
      state.openStep = "carb";
      render();
    }

    function render() {
      reconcileTemplateSelection();
      renderFoodGrids();
      updateSeasonControls();
      updateStepStates();
      updateProgress();
      renderAnalysis();
      renderRecipes();
      renderCookingTemplates();
    }

    document.querySelector('[data-action="random"]').addEventListener("click", randomSteadyMeal);
    document.querySelector('[data-action="clear"]').addEventListener("click", clearSelection);
    document.querySelector('[data-action="finish-fiber"]').addEventListener("click", completeFiberStep);
    document.querySelectorAll('[data-action="toggle-step"]').forEach((button) => {
      button.addEventListener("click", () => toggleStep(button.dataset.target));
    });
    document.querySelectorAll('[data-action="season"]').forEach((button) => {
      button.addEventListener("click", () => setSeasonFilter(button.dataset.season));
    });

    render();
  </script>
</body>
</html>
