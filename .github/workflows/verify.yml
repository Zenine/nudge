name: Verify

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Public verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          # Build backend for scripts/check_package.sh (python -m build --no-isolation)
          python -m pip install build setuptools wheel

      - name: Run public verification
        env:
          NUDGE_PYTHON: python
        run: scripts/verify.sh

      - name: Guard repository-local runtime state
        run: |
          test ! -e .nudge/nudge.db
          test ! -e nudge.db
