[general]
default_calendar = "Personal"
default_reminder_list = "Tasks"
locale = "en-US"

[state]
dir = "~/.local/share/nudge"

[llm]
provider = "ollama"
model = "llama3.2"
max_tokens = 1024
retries = 1
retry_backoff_seconds = 1
# For remote providers, prefer environment variables or a private secrets_path
# in an uncommitted config.toml overlay.

[llm.models]
fast = "llama3.2"
default = "llama3.2"
strong = "llama3.2"

[llm.tasks.fast]
max_tokens = 1024

[llm.tasks.strong]
max_tokens = 2048

[apple.calendar]
backend = "native"

[apple.reminders]
backend = "native"

[apple.notes]
backend = "native"

[apple.clock]
backend = "shortcuts"
shortcut_name = "Nudge Create Alarm"

[daemon]
sleep_ms = 3000
stale_minutes = 30
max_attempts = 3
max_queue_depth = 100
